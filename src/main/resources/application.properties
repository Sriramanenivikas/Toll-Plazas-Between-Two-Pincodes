server.port=8080
spring.config.import=optional:file:.env[.properties],optional:classpath:.env[.properties]

mappls.client-id=${MAPPLS_CLIENT_ID:}
mappls.client-secret=${MAPPLS_CLIENT_SECRET:}
mappls.token-url=https://outpost.mappls.com/api/security/oauth/token
mappls.directions-url=https://apis.mappls.com/advancedmaps/v1

nominatim.base-url=https://nominatim.openstreetmap.org

toll.matching.threshold-km=0.6
toll.data.csv-path=data/toll_plaza_india.csv

logging.level.com.freightfox.tollplaza=DEBUG
logging.level.org.springframework.web=DEBUG
